  description: A solid gold toolbox. A rapper would kill for this.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Tools/Toolboxes/toolbox_gold.rsi #imp edit
    state: icon
  - type: Item
    sprite: _Impstation/Objects/Tools/Toolboxes/toolbox_gold.rsi #imp edit
